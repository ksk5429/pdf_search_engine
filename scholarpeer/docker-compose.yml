services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sp_qdrant
    ports:
      - "6333:6333"  # HTTP + dashboard
      - "6334:6334"  # gRPC
    volumes:
      - ./data/index/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 3s
      retries: 6

  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: sp_grobid
    ports:
      - "8070:8070"
    environment:
      JAVA_OPTS: "-Xmx4g"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 15s
      timeout: 5s
      retries: 6

  # Optional: browse the corpus via dashboard
  # qdrant-ui is served by qdrant itself at /dashboard
