name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install requests
      - name: Verify imports
        run: |
          python -c "from pdf_search_engine import OpenAlexClient, SemanticScholarClient, title_hash, sanitize_filename; print('All imports OK')"
          python -c "from pdf_search_engine import is_relevant; assert is_relevant('scour offshore wind turbine'); assert not is_relevant('quantum computing'); print('Relevance filter OK')"
